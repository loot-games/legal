<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loot Games Legal</title>
    <meta name="description" content="Public legal documents for Loot Games apps." />
    <style>
      :root {
        color-scheme: light;
        color: #233130;
        background: #eef5f1;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background:
          linear-gradient(135deg, rgba(113, 214, 166, 0.16) 0 24%, transparent 24% 100%),
          linear-gradient(315deg, rgba(114, 189, 241, 0.12) 0 22%, transparent 22% 100%),
          #eef5f1;
      }

      main {
        width: min(100% - 32px, 720px);
        margin: 0 auto;
        padding: 56px 0 72px;
      }

      section {
        border: 1px solid rgba(35, 49, 48, 0.12);
        border-radius: 8px;
        padding: clamp(24px, 5vw, 42px);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 64px rgba(35, 49, 48, 0.12);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2.1rem, 8vw, 3.35rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      p {
        margin-top: 14px;
        color: #5f706c;
        font-size: 1rem;
        font-weight: 750;
        line-height: 1.6;
      }

      h2 {
        margin-top: 30px;
        font-size: 1.25rem;
        letter-spacing: 0;
      }

      nav {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      a {
        display: grid;
        min-height: 48px;
        align-items: center;
        border: 1px solid rgba(35, 49, 48, 0.1);
        border-radius: 8px;
        padding: 0 14px;
        color: #233130;
        background: #f7fbf8;
        font-weight: 900;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 2px solid rgba(239, 95, 77, 0.5);
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Loot Games Legal</h1>
        <p>Public legal documents for Loot Games apps.</p>

        <h2>Loot 2048</h2>
        <nav aria-label="Loot 2048 legal documents">
          <a href="/legal/merge-tiles/privacy-policy-en">Privacy Policy</a>
          <a href="/legal/merge-tiles/privacy-policy">プライバシーポリシー</a>
        </nav>
      </section>
    </main>
  </body>
</html>
